<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница — Толдот р. Саадьи</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-view">
    <header class="page-header">
      <a class="nav-home" href="index.html">&#8592; Оглавление</a>

      <nav class="page-nav">
        <a class="nav-btn disabled" id="btn-prev" href="#">&#8592; Пред.</a>
        <span class="page-indicator" id="page-indicator">…</span>
        <a class="nav-btn disabled" id="btn-next" href="#">След. &#8594;</a>
      </nav>

      <form class="page-jump" id="jump-form" title="Перейти к странице">
        <input
          type="number"
          id="jump-input"
          min="1"
          max="117"
          placeholder="№"
        />
        <button class="nav-btn" type="submit">&#8594;</button>
      </form>
    </header>

    <main class="viewer">
      <!-- LEFT: Russian translation -->
      <section class="ru-col">
        <div class="col-label">Перевод на русский язык</div>
        <div class="ru-text" id="ru-text">
          <p class="loading">Загрузка…</p>
        </div>
      </section>

      <!-- RIGHT: Hebrew original image -->
      <section class="he-col">
        <div class="col-label" dir="rtl" lang="he">
          מקור בעברית · עמוד <span id="page-num-he">…</span>
        </div>
        <img class="page-img" id="page-img" src="" alt="" loading="eager" />
      </section>
    </main>

    <footer class="page-footer">
      <a class="nav-btn disabled" id="btn-prev2" href="#">&#8592; Предыдущая</a>
      <span class="page-indicator" id="page-indicator2">…</span>
      <a class="nav-btn disabled" id="btn-next2" href="#">Следующая &#8594;</a>
    </footer>

    <script>
      const TOTAL = 117;

      function imgPath(n) {
        return "img/page-" + String(n).padStart(3, "0") + ".jpg";
      }

      function pageUrl(n) {
        return "page.html?p=" + n;
      }

      function getPageParam() {
        var p = parseInt(new URLSearchParams(location.search).get("p"), 10);
        return p >= 1 && p <= TOTAL ? p : 1;
      }

      async function loadTranslation(n) {
        var ruEl = document.getElementById("ru-text");
        var html =
          '<p class="no-translation">Перевод для этой страницы ещё не добавлен.</p>';
        try {
          var resp = await fetch("translations/ru/" + n + ".html");
          if (resp.ok) {
            var trimmed = (await resp.text()).trim();
            if (trimmed !== "<!-- TODO -->") html = trimmed;
          }
        } catch (e) {}
        ruEl.innerHTML = html;
      }

      function setNavBtn(id, enabled, href) {
        var el = document.getElementById(id);
        if (enabled) {
          el.href = href;
          el.classList.remove("disabled");
        } else {
          el.href = "#";
          el.classList.add("disabled");
        }
      }

      function render(n) {
        document.title = "Стр. " + n + " из " + TOTAL + " — Толдот р. Саадьи";

        // Image
        var img = document.getElementById("page-img");
        img.src = imgPath(n);
        img.alt = "Страница " + n;

        // Hebrew page number label
        document.getElementById("page-num-he").textContent = n;

        // Page indicators
        var label = "Страница " + n + " из " + TOTAL;
        document.getElementById("page-indicator").textContent = label;
        document.getElementById("page-indicator2").textContent = label;

        // Nav buttons
        setNavBtn("btn-prev", n > 1, pageUrl(n - 1));
        setNavBtn("btn-next", n < TOTAL, pageUrl(n + 1));
        setNavBtn("btn-prev2", n > 1, pageUrl(n - 1));
        setNavBtn("btn-next2", n < TOTAL, pageUrl(n + 1));

        // Sync jump input
        document.getElementById("jump-input").value = n;

        // Update URL without reload so browser history works
        history.replaceState(null, "", pageUrl(n));
      }

      // Keyboard navigation
      document.addEventListener("keydown", function (e) {
        if (e.target.tagName === "INPUT") return;
        var n = getPageParam();
        if ((e.key === "ArrowLeft" || e.key === "ArrowUp") && n > 1) {
          location.href = pageUrl(n - 1);
        } else if (
          (e.key === "ArrowRight" || e.key === "ArrowDown") &&
          n < TOTAL
        ) {
          location.href = pageUrl(n + 1);
        }
      });

      // Page-jump form
      document
        .getElementById("jump-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var v = parseInt(document.getElementById("jump-input").value, 10);
          if (v >= 1 && v <= TOTAL) location.href = pageUrl(v);
        });

      // Boot
      (async function () {
        var n = getPageParam();
        render(n);
        await loadTranslation(n);
      })();
    </script>
  </body>
</html>
